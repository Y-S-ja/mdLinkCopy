<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Md Copy - 設定</title>
    <link rel="stylesheet" href="options.css">
</head>

<body>
    <div class="container">
        <header>
            <div class="logo">
                <img src="images\icon192x192.png" alt="Logo">
                <h1>Quick Md Copy <span>Settings</span></h1>
            </div>
            <p class="subtitle">拡張機能の動作をカスタマイズします</p>
        </header>

        <main>
            <section class="card">
                <h2>🔗 URLの形式</h2>
                <div class="setting-item">
                    <div class="info">
                        <label>URLをデコードして読みやすくする</label>
                        <p class="desc">ONにすると、日本語URLなどを読みやすい形式に変換します</p>
                    </div>
                    <div class="input-wrapper">
                        <span id="status-use-readable-url" class="status-message">保存しました</span>
                        <label class="switch">
                            <input type="checkbox" id="use-readable-url">
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </section>

            <section class="card">
                <h2>✨ ハイライト (THRESHOLD)</h2>
                <div class="setting-item">
                    <div class="info">
                        <label for="threshold">省略のしきい値 (文字数)</label>
                        <p class="desc">この文字数を超えると前後のみを抽出します</p>
                    </div>
                    <div class="input-wrapper">
                        <span id="status-threshold" class="status-message">保存しました</span>
                        <input type="number" id="threshold" min="30" max="200" step="5">
                    </div>
                </div>
            </section>

            <section class="card">
                <h2>📏 抽出サイズ (BASE_LEN)</h2>
                <div class="setting-item">
                    <div class="info">
                        <label for="base-len">抽出する長さ (文字数)</label>
                        <p class="desc">最初と最後から何文字ずつ抽出するか指定します</p>
                    </div>
                    <div class="input-wrapper">
                        <span id="status-base-len" class="status-message">保存しました</span>
                        <input type="number" id="base-len" min="10" max="50" step="1">
                    </div>
                </div>
            </section>

            <section class="card">
                <h2>🔔 通知設定</h2>
                <div class="setting-item">
                    <div class="info">
                        <label for="notice-duration">通知の表示時間 (ミリ秒)</label>
                        <p class="desc">「Copied!」などの通知が消えるまでの時間です</p>
                    </div>
                    <div class="input-wrapper">
                        <span id="status-notice-duration" class="status-message">保存しました</span>
                        <input type="number" id="notice-duration" min="500" max="5000" step="100">
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="options.js"></script>
</body>

</html>
